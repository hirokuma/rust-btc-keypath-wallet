name: Rust Format

on:
  pull_request:
    branches:
      - "*"

jobs:
  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

