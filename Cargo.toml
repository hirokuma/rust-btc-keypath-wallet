[package]
name = "btc_wallet"
version = "0.1.0"
edition = "2024"

[features]
default = ["log"]
log = []
tracing = []

[dependencies]
bdk_wallet = { version = "3.0.0", features = ["rusqlite"] }
bdk_electrum = "0.24.0"

log = "0.4.31"
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
toml = "1.1.2"

[dev-dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
env_logger = "0.11.10"
tempfile = "3.27.0"
tracing-log = "0.2.0"
