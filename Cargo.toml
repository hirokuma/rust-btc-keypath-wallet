[workspace]
resolver = "3"

members = [
    "btc_wallet", "main",
]

default-members = [
    "btc_wallet", "main",
]

[workspace.dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.53", features = ["derive"] }
hex = "0.4.3"
log = "0.4.30"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.48.0", features = ["full", "rt-multi-thread"] }
toml = "1.1.2"
